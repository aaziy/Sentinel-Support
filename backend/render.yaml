services:
  - type: web
    name: sentinel-support-backend
    runtime: python
    region: singapore          # closest to your users — change to: oregon, frankfurt, ohio
    plan: free                 # upgrade to starter ($7/mo) to avoid spin-down
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: production
      - key: LLM_PROVIDER
        value: groq
      # ── Secrets – paste values in Render dashboard (Environment tab) ──
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SUPPORT_FROM_EMAIL
        value: support@sentinel-ai.support
      - key: SUPPORT_BRAND_NAME
        value: Sentinel Support
      - key: APP_SECRET_KEY
        sync: false
      # Set this AFTER Vercel deploy — paste your Vercel URL here
      - key: CORS_ORIGIN
        sync: false
